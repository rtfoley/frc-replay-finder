<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRC Replay Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #f0a500;
      --accent-dim:#7d560a;
      --text:      #e6edf3;
      --text-muted:#8b949e;
      --green:     #3fb950;
      --red:       #f85149;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Barlow', sans-serif;
      --radius:    6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ── Header ── */
    header {
      max-width: 720px;
      margin: 0 auto 2.5rem;
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
    }
    header h1 {
      font-family: var(--mono);
      font-size: 1.5rem;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-transform: uppercase;
    }
    header p {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    /* ── Card ── */
    .card {
      max-width: 720px;
      margin: 0 auto 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    /* ── Form elements ── */
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    select, input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.95rem;
      padding: 0.55rem 0.75rem;
      appearance: none;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input[type="number"]:focus {
      border-color: var(--accent);
    }
    select:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 500px) {
      .form-row { grid-template-columns: 1fr; }
    }

    /* ── Button ── */
    button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.6rem 1.5rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 1.25rem;
    }
    button:hover:not(:disabled) { opacity: 0.85; }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Status / error ── */
    .status {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.75rem;
      min-height: 1.2em;
    }
    .status.error { color: var(--red); }
    .status.loading::after {
      content: '';
      display: inline-block;
      width: 0.5em;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Warning banner ── */
    .warning {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      background: rgba(240,165,0,0.08);
      border: 1px solid var(--accent-dim);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      font-size: 0.825rem;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .warning-icon { flex-shrink: 0; font-size: 1rem; }

    /* ── Results ── */
    #results { max-width: 720px; margin: 0 auto; }

    .results-header {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .slot-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .slot {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      animation: fadeIn 0.2s ease both;
    }
    .slot:nth-child(1) { animation-delay: 0.05s; }
    .slot:nth-child(2) { animation-delay: 0.10s; }
    .slot:nth-child(3) { animation-delay: 0.15s; }
    .slot:nth-child(4) { animation-delay: 0.20s; }
    .slot:nth-child(5) { animation-delay: 0.25s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .slot-rank {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      width: 1.5rem;
      flex-shrink: 0;
      text-align: right;
    }
    .slot-rank.top { color: var(--accent); }

    .slot-label {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      flex: 1;
    }

    .slot-gap {
      font-family: var(--mono);
      font-size: 0.875rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .slot-gap span {
      color: var(--green);
      font-weight: 600;
    }

    .slot-badge {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: rgba(240,165,0,0.12);
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      border-radius: 3px;
      padding: 0.15rem 0.4rem;
      white-space: nowrap;
    }

    .null-result {
      font-family: var(--mono);
      font-size: 0.875rem;
      color: var(--red);
      padding: 1rem;
      border: 1px solid #3d1a1a;
      background: rgba(248,81,73,0.05);
      border-radius: var(--radius);
    }

    /* ── Divider ── */
    .divider {
      max-width: 720px;
      margin: 0 auto 1.25rem;
      height: 1px;
      background: var(--border);
    }

    .schedule-container {
      margin-top: 1.5rem;
      border-top: 2px solid var(--border);
      padding-top: 1rem;
    }

    .match-row {
      display: grid;
      grid-template-columns: 4.5rem 5.5rem 1fr;
      align-items: center;
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.85rem;
    }

    .match-row.has-replay-team {
      background: rgba(240, 165, 0, 0.03);
    }

    .match-row.break {
      background: var(--surface);
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-top: 1px solid var(--accent-dim);
      border-bottom: 1px solid var(--accent-dim);
      height: 2.5rem;
    }

    .team-chip {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      color: var(--text-muted);
    }

    .team-chip.highlight {
      background: var(--accent);
      color: #000;
      font-weight: 700;
    }

    .match-num { color: var(--text); font-weight: 600; }
    .match-time { color: var(--text-muted); }
  </style>
</head>
<body>

  <header>
    <h1>Replay Scheduler</h1>
    <p>FRC qualification match replay placement tool</p>
  </header>

  <div class="card">
    <div class="form-row">
      <div>
        <label for="event-select">Event</label>
        <select id="event-select" disabled>
          <option value="">Loading events…</option>
        </select>
      </div>
      <div>
        <label for="match-input">Match to Replay</label>
        <input type="number" id="match-input" min="1" placeholder="e.g. 35" disabled />
      </div>
    </div>
    <button id="find-btn" disabled>Find Replay Slots</button>
    <div class="status" id="status"></div>
  </div>

  <div id="results"></div>

  <script src="config.js"></script>
  <script src="replayScheduler.js"></script>
  <script>
    // -------------------------------------------------------------------------
    // TBA API
    // -------------------------------------------------------------------------

    const TBA_BASE = 'https://www.thebluealliance.com/api/v3';

    async function tbaGet(path) {
      const res = await fetch(`${TBA_BASE}${path}`, {
        headers: { 'X-TBA-Auth-Key': TBA_CONFIG.apiKey },
      });
      if (!res.ok) throw new Error(`TBA ${res.status}: ${path}`);
      return res.json();
    }

    /**
     * Fetch qual matches for an event and return them as our internal schedule format.
     * TBA match key format: {event_key}_qm{match_number}
     */
    async function fetchSchedule(eventKey) {
      const matches = await tbaGet(`/event/${eventKey}/matches`);
      return matches
        .filter(m => m.comp_level === 'qm')
        .map(m => ({
          matchNumber: m.match_number,
          teams: [
            ...m.alliances.red.team_keys,
            ...m.alliances.blue.team_keys,
          ].map(k => k.replace('frc', '')), // strip "frc" prefix → "254"
          timestamp: m.time ? new Date(m.time * 1000) : undefined,
        }))
        .sort((a, b) => a.matchNumber - b.matchNumber);
    }

    /**
     * Fetch events for a given year, sorted: active today first, then by start date.
     */
    async function fetchEvents(year) {
      const events = await tbaGet(`/events/${year}/simple`);
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      return events
        .filter(e => e.event_type !== 99) // exclude offseasons with type 99 (preseason)
        .sort((a, b) => {
          const aActive = isActiveToday(a, today);
          const bActive = isActiveToday(b, today);
          if (aActive !== bActive) return bActive - aActive; // active first
          return new Date(a.start_date) - new Date(b.start_date);
        });
    }

    function parseLocalDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d); // local midnight, no UTC shift
    }

    function isActiveToday(event, today) {
      const start = parseLocalDate(event.start_date);
      const end   = parseLocalDate(event.end_date);
      return today >= start && today <= end;
    }

    function formatEventLabel(event, today) {
      const active = isActiveToday(event, today);
      const prefix = active ? '▶ ' : '';
      return `${prefix}${event.name} (${event.event_code.toUpperCase()})`;
    }

    // -------------------------------------------------------------------------
    // UI
    // -------------------------------------------------------------------------

    const eventSelect = document.getElementById('event-select');
    const matchInput  = document.getElementById('match-input');
    const findBtn     = document.getElementById('find-btn');
    const statusEl    = document.getElementById('status');
    const resultsEl   = document.getElementById('results');

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (type ? ` ${type}` : '');
    }

    function enableForm() {
      eventSelect.disabled = false;
      matchInput.disabled  = false;
      findBtn.disabled     = false;
    }

    // Load events on page load
    (async () => {
      const year = new Date().getFullYear();
      setStatus(`Loading ${year} events…`, 'loading');
      try {
        const events = await fetchEvents(year);
        const today = new Date(); today.setHours(0,0,0,0);

        eventSelect.innerHTML = '<option value="">— Select an event —</option>';

        // Separator between active and upcoming if both exist
        const active   = events.filter(e => isActiveToday(e, today));
        const inactive = events.filter(e => !isActiveToday(e, today));

        if (active.length) {
          const grp = document.createElement('optgroup');
          grp.label = '▶  Active Today';
          active.forEach(e => {
            const opt = document.createElement('option');
            opt.value = e.key;
            opt.textContent = `${e.name} (${e.event_code.toUpperCase()})`;
            grp.appendChild(opt);
          });
          eventSelect.appendChild(grp);
        }

        if (inactive.length) {
          const grp = document.createElement('optgroup');
          grp.label = 'All Events';
          inactive.forEach(e => {
            const opt = document.createElement('option');
            opt.value = e.key;
            opt.textContent = `${e.name} — ${e.start_date}`;
            grp.appendChild(opt);
          });
          eventSelect.appendChild(grp);
        }

        enableForm();
        setStatus(`${events.length} events loaded.`);
      } catch (err) {
        setStatus(`Failed to load events: ${err.message}`, 'error');
        console.error(err);
      }
    })();

    // Run on button click
    findBtn.addEventListener('click', async () => {
      resultsEl.innerHTML = '';
      const eventKey   = eventSelect.value;
      const matchNum   = parseInt(matchInput.value, 10);

      if (!eventKey) { setStatus('Select an event first.', 'error'); return; }
      if (!matchNum || matchNum < 1) { setStatus('Enter a valid match number.', 'error'); return; }

      findBtn.disabled = true;
      setStatus('Fetching schedule…', 'loading');

      try {
        const schedule = await fetchSchedule(eventKey);
        const replayTeams = schedule.find(m => m.matchNumber === matchNum).teams;
        setStatus('Calculating…', 'loading');

        const result = findReplaySlot(schedule, matchNum, { topN: 5 });
        renderResults(result, matchNum);
        renderSchedule(schedule, replayTeams, matchNum); // New call
        setStatus('');
      } catch (err) {
        setStatus(err.message, 'error');
        console.error(err);
      } finally {
        findBtn.disabled = false;
      }
    });

    function renderResults(result, matchNum) {
      resultsEl.innerHTML = '';

      if (!result) {
        resultsEl.innerHTML = `
          <div class="null-result">
            No valid replay slot found for Q${matchNum} — all positions result in back-to-back matches for at least one team. Place manually.
          </div>`;
        return;
      }

      const wrap = document.createElement('div');
      wrap.className = 'card';

      if (result.missingTimestamps) {
        wrap.innerHTML = `
          <div class="warning">
            <span class="warning-icon">⚠</span>
            <span>Schedule is missing timestamps — break detection unavailable. Gaps are based on match order only.</span>
          </div>`;
      }

      wrap.innerHTML += `<div class="results-header">Suggested slots for Q${matchNum} replay</div>`;

      const list = document.createElement('div');
      list.className = 'slot-list';

      const topGap = result.candidates[0].minGap;

      result.candidates.forEach((c, i) => {
        const isTied = c.minGap === topGap;
        const gapDisplay = c.minGap === Infinity ? '∞' : c.minGap;

        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.innerHTML = `
          <span class="slot-rank ${isTied && i === 0 ? 'top' : ''}">#${i + 1}</span>
          <span class="slot-label">${c.insertionLabel}</span>
          ${c.isAfterBreak ? '<span class="slot-badge">after break</span>' : ''}
          <span class="slot-gap">min gap <span>${gapDisplay}</span></span>
        `;
        list.appendChild(slot);
      });

      wrap.appendChild(list);
      resultsEl.appendChild(wrap);
    }

    function renderSchedule(schedule, replayTeams, replayMatchNum) {
      const container = document.createElement('div');
      container.className = 'schedule-container';
      container.innerHTML = `<div class="results-header">Full Schedule (from Q${replayMatchNum})</div>`;

      const startIndex = schedule.findIndex(m => m.matchNumber === replayMatchNum);
      
      for (let i = startIndex; i < schedule.length; i++) {
        const match = schedule[i];
        
        // Detect and render breaks
        if (i > startIndex && schedule[i-1].timestamp && match.timestamp) {
          const gap = (new Date(match.timestamp) - new Date(schedule[i-1].timestamp)) / 60000;
          if (gap >= 30) {
            const breakRow = document.createElement('div');
            breakRow.className = 'match-row break';
            breakRow.innerHTML = `<span></span><span>BREAK</span>`;
            container.appendChild(breakRow);
          }
        }

        const hasReplayTeam = match.teams.some(t => replayTeams.includes(t));
        const row = document.createElement('div');
        row.className = `match-row ${hasReplayTeam ? 'has-replay-team' : ''}`;
        
        const timeStr = match.timestamp 
          ? new Date(match.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
          : '--:--';

        const teamList = match.teams.map(t => {
          const isReplayTeam = replayTeams.includes(t);
          return `<span class="team-chip ${isReplayTeam ? 'highlight' : ''}">${t}</span>`;
        }).join(' ');

        row.innerHTML = `
          <span class="match-num">Q${match.matchNumber}</span>
          <span class="match-time">${timeStr}</span>
          <div class="team-list">${teamList}</div>
        `;
        container.appendChild(row);
      }
      resultsEl.appendChild(container);
    }
  </script>
</body>
</html>
