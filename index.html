<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FRC Replay Scheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #f0a500;
      --accent-dim:#7d560a;
      --text:      #e6edf3;
      --text-muted:#8b949e;
      --green:     #3fb950;
      --red:       #f85149;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Barlow', sans-serif;
      --radius:    6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    /* ── Layout & Cards ── */
    header, .card, #results, .divider {
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
    }

    header {
      margin-bottom: 2.5rem;
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
    }
    header h1 {
      font-family: var(--mono);
      font-size: 1.5rem;
      color: var(--accent);
      text-transform: uppercase;
    }
    header p { color: var(--text-muted); font-size: 0.875rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    /* ── Form Elements ── */
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    select, input[type="number"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      padding: 0.55rem 0.75rem;
      outline: none;
    }
    select:focus, input[type="number"]:focus { border-color: var(--accent); }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    button {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      padding: 0.6rem 1.5rem;
      cursor: pointer;
      margin-top: 1.25rem;
    }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Results & Slots ── */
    .results-header {
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--border);
    }

    .slot {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      margin-bottom: 0.5rem;
    }

    .slot-rank { font-family: var(--mono); width: 1.5rem; color: var(--text-muted); }
    .slot-rank.top { color: var(--accent); }
    .slot-label { font-family: var(--mono); font-weight: 600; flex: 1; }
    .slot-gap span { color: var(--green); font-weight: 600; }

    /* ── Schedule Table ── */
    .match-row {
      display: grid;
      grid-template-columns: 4rem 6.5rem 1fr; /* Widened time column slightly */
      align-items: center;
      padding: 0.6rem 0.75rem; /* More vertical breathing room */
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      transition: background 0.2s ease;
    }

    .match-num {
      font-weight: 700;
      color: var(--accent); /* Makes the 'Q35' stand out */
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    .match-time {
      color: var(--text); 
      font-size: 0.85rem;
      opacity: 0.85; /* Bright enough to read, dim enough to not distract */
    }

    .match-row.has-replay-team { background: rgba(240, 165, 0, 0.03); }
    
    .match-row.break {
      background: var(--surface);
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      border-top: 1px solid var(--accent-dim);
      border-bottom: 1px solid var(--accent-dim);
    }

    .team-list {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .alliance-group {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    /* ── Team Chips ── */
    .team-chip {
      padding: 4px 10px;
      border-radius: 20px;
      font-family: var(--mono);
      font-size: 0.85rem;
      min-width: 4rem;
      text-align: center;
      border: 1px solid transparent;
      display: inline-block;
    }

    /* Non-highlighted Tints */
    .alliance-group:first-child .team-chip {
      background: rgba(248, 81, 73, 0.1);
      color: #f85149;
      border-color: rgba(248, 81, 73, 0.2);
    }
    .alliance-group:last-child .team-chip {
      background: rgba(56, 139, 253, 0.1);
      color: #58a6ff;
      border-color: rgba(56, 139, 253, 0.2);
    }

    /* Tracked Team Highlights */
    .team-chip.highlight-red {
      background: #ce1126 !important;
      color: #ffffff !important;
      border-color: #ff7b72 !important;
      font-weight: 700;
    }
    .team-chip.highlight-blue {
      background: #0066b2 !important;
      color: #ffffff !important;
      border-color: #58a6ff !important;
      font-weight: 700;
    }

    .vs-divider {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 800;
      opacity: 0.5;
      margin: 0 4px;
    }

    /* ── Utilities & Mobile ── */
    @media (max-width: 500px) {
      .form-row { grid-template-columns: 1fr; }
      .vs-divider { display: none; }
      .match-row { grid-template-columns: 3.5rem 1fr; }
      .match-time { display: none; } /* Saves space on mobile rows */
    }

    @keyframes blink { 50% { opacity: 0; } }
    .status.loading::after { content: ''; animation: blink 1s step-end infinite; }
  </style>
</head>
<body>

  <header>
    <h1>Replay Scheduler</h1>
    <p>FRC qualification match replay placement tool</p>
  </header>

  <div class="card">
    <div class="form-row">
      <div>
        <label for="event-select">Event</label>
        <select id="event-select" disabled>
          <option value="">Loading events…</option>
        </select>
      </div>
      <div>
        <label for="match-input">Match to Replay</label>
        <input type="number" id="match-input" min="1" placeholder="e.g. 35" disabled />
      </div>
    </div>
    <button id="find-btn" disabled>Find Replay Slots</button>
    <div class="status" id="status"></div>
  </div>

  <div id="results"></div>

  <script src="replayScheduler.js"></script>
  <script>
    // -------------------------------------------------------------------------
    // TBA API
    // -------------------------------------------------------------------------

    const TBA_BASE = 'https://www.thebluealliance.com/api/v3';
    const TBA_KEY = 'sBQ9s7T3fMH9qo4aUtvTOXNkrchqIH2Jwmy1GFIwjW94148bba7T9lu9pjdSrTqx';

    async function tbaGet(path) {
      const res = await fetch(`${TBA_BASE}${path}`, {
        headers: { 'X-TBA-Auth-Key': TBA_KEY },
      });
      if (!res.ok) throw new Error(`TBA ${res.status}: ${path}`);
      return res.json();
    }

    /**
     * Fetch qual matches for an event and return them as our internal schedule format.
     * TBA match key format: {event_key}_qm{match_number}
     */
    async function fetchSchedule(eventKey) {
      const matches = await tbaGet(`/event/${eventKey}/matches`);
      return matches
        .filter(m => m.comp_level === 'qm')
        .map(m => ({
          matchNumber: m.match_number,
          // Explicitly order: Red 1, 2, 3 THEN Blue 1, 2, 3
          teams: [
            ...m.alliances.red.team_keys,
            ...m.alliances.blue.team_keys,
          ].map(k => k.replace('frc', '')), 
          timestamp: m.time ? new Date(m.time * 1000) : undefined,
        }))
        .sort((a, b) => a.matchNumber - b.matchNumber);
    }

    /**
     * Fetch events for a given year, sorted: active today first, then by start date.
     */
    async function fetchEvents(year) {
      const events = await tbaGet(`/events/${year}/simple`);
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      return events
        .filter(e => e.event_type !== 99) // exclude offseasons with type 99 (preseason)
        .sort((a, b) => {
          const aActive = isActiveToday(a, today);
          const bActive = isActiveToday(b, today);
          if (aActive !== bActive) return bActive - aActive; // active first
          return new Date(a.start_date) - new Date(b.start_date);
        });
    }

    function parseLocalDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d); // local midnight, no UTC shift
    }

    function isActiveToday(event, today) {
      const start = parseLocalDate(event.start_date);
      const end   = parseLocalDate(event.end_date);
      return today >= start && today <= end;
    }

    function formatEventLabel(event, today) {
      const active = isActiveToday(event, today);
      const prefix = active ? '▶ ' : '';
      return `${prefix}${event.name} (${event.event_code.toUpperCase()})`;
    }

    // -------------------------------------------------------------------------
    // UI
    // -------------------------------------------------------------------------

    const eventSelect = document.getElementById('event-select');
    const matchInput  = document.getElementById('match-input');
    const findBtn     = document.getElementById('find-btn');
    const statusEl    = document.getElementById('status');
    const resultsEl   = document.getElementById('results');

    function setStatus(msg, type = '') {
      statusEl.textContent = msg;
      statusEl.className = 'status' + (type ? ` ${type}` : '');
    }

    function enableForm() {
      eventSelect.disabled = false;
      matchInput.disabled  = false;
      findBtn.disabled     = false;
    }

    // Load events on page load
    (async () => {
      const year = new Date().getFullYear();
      setStatus(`Loading ${year} events…`, 'loading');
      try {
        const events = await fetchEvents(year);
        const today = new Date(); today.setHours(0,0,0,0);

        eventSelect.innerHTML = '<option value="">— Select an event —</option>';

        // Separator between active and upcoming if both exist
        const active   = events.filter(e => isActiveToday(e, today));
        const inactive = events.filter(e => !isActiveToday(e, today));

        if (active.length) {
          const grp = document.createElement('optgroup');
          grp.label = '▶  Active Today';
          active.forEach(e => {
            const opt = document.createElement('option');
            opt.value = e.key;
            opt.textContent = `${e.name} (${e.event_code.toUpperCase()})`;
            grp.appendChild(opt);
          });
          eventSelect.appendChild(grp);
        }

        if (inactive.length) {
          const grp = document.createElement('optgroup');
          grp.label = 'All Events';
          inactive.forEach(e => {
            const opt = document.createElement('option');
            opt.value = e.key;
            opt.textContent = `${e.name} — ${e.start_date}`;
            grp.appendChild(opt);
          });
          eventSelect.appendChild(grp);
        }

        enableForm();
        setStatus(`${events.length} events loaded.`);
      } catch (err) {
        setStatus(`Failed to load events: ${err.message}`, 'error');
        console.error(err);
      }
    })();

    // Run on button click
    findBtn.addEventListener('click', async () => {
      resultsEl.innerHTML = '';
      const eventKey = eventSelect.value;
      const matchNum = parseInt(matchInput.value, 10);

      if (!eventKey || !matchNum) return;

      findBtn.disabled = true;
      setStatus('Fetching schedule...', 'loading');

      try {
        const schedule = await fetchSchedule(eventKey);
        
        // TYPE-SAFE LOOKUP: Ensure matchNum is treated as a number
        const replayMatch = schedule.find(m => Number(m.matchNumber) === matchNum);
        
        if (!replayMatch) {
          throw new Error(`Match Q${matchNum} not found in the current schedule.`);
        }

        // Now it's safe to call these
        const result = findReplaySlot(schedule, matchNum, { topN: 5 });
        
        renderResults(result, matchNum);
        renderSchedule(schedule, matchNum); // Pass the raw schedule and number
        
        setStatus('');
      } catch (err) {
        setStatus(err.message, 'error');
        console.error(err);
      } finally {
        findBtn.disabled = false;
      }
    });

    function renderResults(result, matchNum) {
      resultsEl.innerHTML = '';

      if (!result) {
        resultsEl.innerHTML = `
          <div class="null-result">
            No valid replay slot found for Q${matchNum} — all positions result in back-to-back matches for at least one team. Place manually.
          </div>`;
        return;
      }

      const wrap = document.createElement('div');
      wrap.className = 'card';

      if (result.missingTimestamps) {
        wrap.innerHTML = `
          <div class="warning">
            <span class="warning-icon">⚠</span>
            <span>Schedule is missing timestamps — break detection unavailable. Gaps are based on match order only.</span>
          </div>`;
      }

      wrap.innerHTML += `<div class="results-header">Suggested slots for Q${matchNum} replay</div>`;

      const list = document.createElement('div');
      list.className = 'slot-list';

      const topGap = result.candidates[0].minGap;

      result.candidates.forEach((c, i) => {
        const isTied = c.minGap === topGap;
        const gapDisplay = c.minGap === Infinity ? '∞' : c.minGap;

        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.innerHTML = `
          <span class="slot-rank ${isTied && i === 0 ? 'top' : ''}">#${i + 1}</span>
          <span class="slot-label">${c.insertionLabel}</span>
          ${c.isAfterBreak ? '<span class="slot-badge">after break</span>' : ''}
          <span class="slot-gap">min gap <span>${gapDisplay}</span></span>
        `;
        list.appendChild(slot);
      });

      wrap.appendChild(list);
      resultsEl.appendChild(wrap);
    }

    function renderSchedule(schedule, replayMatchNum) {
      const targetNum = Number(replayMatchNum);
      const replayMatch = schedule.find(m => Number(m.matchNumber) === targetNum);

      if (!replayMatch || !replayMatch.teams) return;

      // These are the 6 teams we are tracking
      const replayTeams = replayMatch.teams;
      
      const startIndex = schedule.findIndex(m => Number(m.matchNumber) === targetNum);

      const container = document.createElement('div');
      container.className = 'card schedule-container';
      container.innerHTML = `<div class="results-header">Full Schedule (from Q${targetNum})</div>`;

      const list = document.createElement('div');
      
      for (let i = startIndex; i < schedule.length; i++) {
        const match = schedule[i];
        
        // Break rendering
        if (i > startIndex && schedule[i-1].timestamp && match.timestamp) {
          const gap = (new Date(match.timestamp) - new Date(schedule[i-1].timestamp)) / 60000;
          if (gap >= 30) {
            const breakRow = document.createElement('div');
            breakRow.className = 'match-row break';
            breakRow.innerHTML = `<span>BREAK</span>`;
            list.appendChild(breakRow);
          }
        }

        const row = document.createElement('div');
        const hasReplayTeam = match.teams.some(t => replayTeams.includes(t));
        row.className = `match-row ${hasReplayTeam ? 'has-replay-team' : ''}`;
        
        const timeStr = match.timestamp 
          ? new Date(match.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
          : '--:--';

        // Helper to render a group of 3 teams (Red or Blue)
        const renderGroup = (teams, offset) => {
          return teams.map((t, idx) => {
            const currentPos = offset + idx;
            let highlightClass = '';
            
            if (replayTeams.includes(t)) {
              // Highlight based on CURRENT alliance position
              highlightClass = (currentPos < 3) ? 'highlight-red' : 'highlight-blue';
            }
            return `<span class="team-chip ${highlightClass}">${t}</span>`;
          }).join(' ');
        };

        const redHtml = renderGroup(match.teams.slice(0, 3), 0);
        const blueHtml = renderGroup(match.teams.slice(3, 6), 3);

        row.innerHTML = `
          <span class="match-num">Q${match.matchNumber}</span>
          <span class="match-time">${timeStr}</span>
          <div class="team-list">
            <div class="alliance-group">${redHtml}</div>
            <span class="vs-divider">VS</span>
            <div class="alliance-group">${blueHtml}</div>
          </div>
        `;
        list.appendChild(row);
      }
      
      container.appendChild(list);
      resultsEl.appendChild(container);
    }
  </script>
</body>
</html>
